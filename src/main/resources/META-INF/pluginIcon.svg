<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Lua 牌子（蓝色圆角矩形，左上角） -->
  <rect x="2" y="2" width="20" height="11" rx="2.5" ry="2.5" fill="#4A90D9"/>
  <!-- Lua 文字 -->
  <text x="12" y="11" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold"
        fill="white" text-anchor="middle">Lua</text>

  <!-- 举牌的左翅膀（根部贴身体左侧，向左上方伸出） -->
  <ellipse cx="15" cy="24" rx="2" ry="6" fill="#2c2c2c" transform="rotate(-50 15 24)"/>

  <!-- 身体 -->
  <ellipse cx="25" cy="30" rx="10" ry="10.5" fill="#2c2c2c"/>
  <!-- 腹部白色 -->
  <ellipse cx="25" cy="31" rx="6.2" ry="7.5" fill="#f5f5f5"/>
  <!-- 头部 -->
  <ellipse cx="25" cy="17" rx="7" ry="6.5" fill="#2c2c2c"/>
  <!-- 眼睛左 -->
  <circle cx="22" cy="15.5" r="1.7" fill="white"/>
  <circle cx="22.3" cy="15.5" r="0.85" fill="#1a1a1a"/>
  <!-- 眼睛右 -->
  <circle cx="28" cy="15.5" r="1.7" fill="white"/>
  <circle cx="27.7" cy="15.5" r="0.85" fill="#1a1a1a"/>
  <!-- 眼睛高光 -->
  <circle cx="22.6" cy="14.9" r="0.35" fill="white"/>
  <circle cx="28.3" cy="14.9" r="0.35" fill="white"/>
  <!-- 嘴巴 -->
  <ellipse cx="25" cy="19.5" rx="2.2" ry="1.1" fill="#f5a623"/>

  <!-- 右翅膀（自然下垂） -->
  <ellipse cx="34.5" cy="29" rx="2.2" ry="5" fill="#2c2c2c" transform="rotate(-10 34.5 29)"/>

  <!-- 脚左 -->
  <ellipse cx="21" cy="39.5" rx="3" ry="1.3" fill="#f5a623"/>
  <!-- 脚右 -->
  <ellipse cx="29" cy="39.5" rx="3" ry="1.3" fill="#f5a623"/>
</svg>
